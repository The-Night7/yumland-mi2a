<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Livreur</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="delivery-app">
    <header class="app-header">
        <h2>LIVRAISON</h2>
        <small>Zone : Cergy Centre</small>

        <button id="toggle-dark-mode" class="btn-livreur">
            🌙 MODE NUIT
        </button>
    </header>

    <main class="order-list" id="deliveries-container">
    </main>

    <div class="nav-bottom-spacer"></div>
    <nav class="nav-bottom">
        <a href="#" class="nav-item active">Commandes</a>
        <a href="profil.html" class="nav-item">Mon Profil</a>
        <a href="../../index.html" class="nav-item nav-item-quit">Quitter</a>
    </nav>
</div>

<script>
    // 1. Base de données des livraisons en cours
    const deliveries = [
        {
            id: 'CMD-002',
            client: 'M. Martin',
            address: '12 Rue du Port, Cergy',
            code: 'A123',
            floor: '3ème étage',
            tel: '06 01 02 03 04',
            comment: 'Sonner fort',
            total: '22.50€'
        },
        {
            id: 'CMD-005',
            client: 'Mme. Durand',
            address: "5 Bd de l'Oise, Cergy",
            code: 'Interphone B',
            floor: '1er étage',
            tel: '06 05 06 07 08',
            comment: '',
            total: '15.00€'
        }
    ];

    // 2. Fonction pour afficher les cartes (sans styles en ligne)
    function renderDeliveries() {
        const container = document.getElementById('deliveries-container');

        if(deliveries.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:20px; font-weight:bold;">Aucune commande à livrer pour le moment.</p>';
            return;
        }

        container.innerHTML = deliveries.map(d => `
            <div class="delivery-card">
                <div class="delivery-card-header">
                    <h3>${d.client}</h3>
                    <span class="delivery-total">${d.total}</span>
                </div>

                <p>📍 <strong>Adresse:</strong> ${d.address}</p>
                <p>🔑 <strong>Accès:</strong> ${d.code} | ${d.floor}</p>
                <p class="delivery-tel">📞 ${d.tel} ${d.comment ? `| ⚠️ ${d.comment}` : ''}</p>

                <div class="delivery-actions">
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address)}"
                       target="_blank" class="btn-livreur btn-gps">
                       🗺️ OUVRIR LE GPS
                    </a>

                    <button class="btn-livreur btn-validate" onclick="confirmDelivery('${d.id}')">
                       ✅ VALIDER LA LIVRAISON
                    </button>
                </div>
            </div>
        `).join('');
    }

    // 3. Fonction pour valider et supprimer la commande
    function confirmDelivery(id) {
        if(confirm('Confirmez-vous la remise de la commande ' + id + ' au client ?')) {
            const index = deliveries.findIndex(d => d.id === id);
            if(index > -1) {
                deliveries.splice(index, 1);
                renderDeliveries();
                alert('Commande validée ! Bon travail.');
            }
        }
    }

    // 4. Initialisation et gestion du mode nuit
    document.addEventListener('DOMContentLoaded', () => {
        renderDeliveries();

        const toggleBtn = document.getElementById('toggle-dark-mode');
        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');

                if(document.body.classList.contains('dark-mode')) {
                    toggleBtn.innerHTML = "☀️ MODE JOUR";
                } else {
                    toggleBtn.innerHTML = "🌙 MODE NUIT";
                }
            });
        }
    });
</script>
</body>
</html>
